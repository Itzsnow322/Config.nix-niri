### ~/.config/kitty/kitty.conf
### Tema gris neutro

# ============================================================
# FUENTE
# ============================================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

disable_ligatures never

# ============================================================
# CURSOR
# ============================================================
cursor_shape            beam
cursor_blink_interval   0.5
cursor_trail             1

# ============================================================
# SCROLLBACK
# ============================================================
scrollback_lines 10000

# ============================================================
# VENTANA
# ============================================================
window_padding_width     14
window_margin_width      0
hide_window_decorations  yes
background_opacity       0.88
dynamic_background_opacity yes
confirm_os_window_close   0

# ============================================================
# TABS
# ============================================================
tab_bar_edge              top
tab_bar_style              powerline
tab_powerline_style        slanted
tab_title_template          "{title}"
active_tab_font_style       bold

# ============================================================
# COMPORTAMIENTO
# ============================================================
enable_audio_bell    no
allow_remote_control  yes
update_check_interval 0
copy_on_select         yes

# ============================================================
# COLORES — Gris neutro
# ============================================================
foreground              #D4D4D8
background              #18181B
selection_foreground    #18181B
selection_background    #A1A1AA

cursor            #E4E4E7
cursor_text_color #18181B

url_color #A1A1AA

# ventana activa/inactiva
active_border_color   #A1A1AA
inactive_border_color #3F3F46
bell_border_color     #71717A

active_tab_foreground   #18181B
active_tab_background   #D4D4D8
inactive_tab_foreground #A1A1AA
inactive_tab_background #27272A
tab_bar_background      #0F0F10

# Paleta de 16 colores (grises, mismo tono para todo)
# black
color0  #27272A
color8  #3F3F46
# red -> gris rojizo apagado
color1  #8D8D93
color9  #A1A1AA
# green -> gris con leve tinte
color2  #9A9A9F
color10 #B0B0B5
# yellow
color3  #A8A8AD
color11 #BCBCC1
# blue
color4  #8E8E93
color12 #A5A5AA
# magenta
color5  #96969B
color13 #ACACB1
# cyan
color6  #909095
color14 #A6A6AB
# white
color7  #D4D4D8
color15 #E4E4E7

# ============================================================
# WAYLAND / NIRI
# ============================================================
wayland_titlebar_color background
linux_display_server   wayland
